<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <title>Groceries</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="tabs">
    <button class="tab" data-tab="edit" type="button">Edit</button>
    <button class="tab" data-tab="shop" type="button">Shop</button>
  </nav>

  <main>
    <section class="screen" data-screen="edit">
      <form id="add-form">
        <input id="add-input" type="text" placeholder="Add item&hellip;" autocomplete="off" autocapitalize="sentences" enterkeyhint="done">
        <button type="submit" aria-label="Add">+</button>
      </form>

      <h2>Common items</h2>
      <ul id="common-list"></ul>

      <h2>One-off items</h2>
      <ul id="oneoff-list"></ul>

      <div class="clear-actions">
        <button id="clear-checked" type="button">Clear checked</button>
        <button id="clear-all" type="button">Clear all</button>
      </div>
    </section>

    <section class="screen" data-screen="shop">
      <ul id="shop-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
